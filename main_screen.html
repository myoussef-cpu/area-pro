<script>
(function() {
  'use strict';

  const TOOLS = window.TOOLS || [];
  const CATEGORIES = window.getAllCategories ? window.getAllCategories() : [];

  const CATEGORY_GRADIENTS = {
    geometry: 'linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%)',
    volumes: 'linear-gradient(135deg, #0acf83 0%, #059669 100%)',
    construction: 'linear-gradient(135deg, #ff6b35 0%, #dc2626 100%)',
    conversion: 'linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%)',
    electrical: 'linear-gradient(135deg, #ffc043 0%, #d97706 100%)',
    mechanical: 'linear-gradient(135deg, #ff3b30 0%, #b91c1c 100%)',
    math: 'linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%)',
    structural: 'linear-gradient(135deg, #6366f1 0%, #4338ca 100%)',
    hvac: 'linear-gradient(135deg, #0dcaf0 0%, #0891b2 100%)'
  };

  const CATEGORY_ORDER = ['geometry', 'volumes', 'construction', 'conversion', 'electrical', 'mechanical', 'math', 'structural', 'hvac'];

  // ─── Time-based Greeting ───
  function setGreeting() {
    const h = new Date().getHours();
    let msg = 'مرحباً';
    if (h >= 5 && h < 12) msg = 'صباح الخير';
    else if (h >= 12 && h < 17) msg = 'مساء الخير';
    else if (h >= 17 || h < 5) msg = 'مساء الخير';
    document.getElementById('greetingText').textContent = msg;
  }
  setGreeting();

  // ─── Render Categories ───
  function renderCategories() {
    const grid = document.getElementById('categoriesGrid');
    if (!grid) return;
    let html = '';
    CATEGORY_ORDER.forEach(catId => {
      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      const toolsInCat = TOOLS.filter(t => t.cat === catId);
      const count = toolsInCat.length;
      const gradient = CATEGORY_GRADIENTS[catId] || 'linear-gradient(135deg, #6366f1, #4338ca)';
      html += `
        <div class="cat-card" style="background:${gradient}" onclick="window.navigateTo('tools_by_category', {category:'${catId}'})">
          <div class="cat-icon"><i class="${cat.icon}"></i></div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-count">${count} أدوات</div>
          <div class="cat-arrow"><i class="fas fa-chevron-left"></i></div>
        </div>
      `;
    });
    grid.innerHTML = html;
  }
  renderCategories();

  // ─── Render All Tools (first 12) ───
  function renderAllTools() {
    const list = document.getElementById('allToolsList');
    if (!list) return;
    const max = 12;
    const slice = TOOLS.slice(0, max);
    let html = '';
    slice.forEach(tool => {
      const cat = CATEGORIES.find(c => c.id === tool.cat);
      const color = cat ? cat.color : '#6366f1';
      html += `
        <div class="tools-compact-item" data-tool-id="${tool.id}" onclick="window.navigateTo('${tool.id}')">
          <span class="tci-icon" style="background:${color}"><i class="${tool.icon}"></i></span>
          <span class="tci-name">${tool.name}</span>
          <span class="tci-arrow"><i class="fas fa-chevron-left"></i></span>
        </div>
      `;
    });
    list.innerHTML = html;
  }
  renderAllTools();

  // ─── Recently Used ───
  function renderRecentlyUsed() {
    const container = document.getElementById('recentlyUsed');
    if (!container) return;
    let recent;
    try {
      recent = JSON.parse(localStorage.getItem('area-pro-history-list') || '[]');
    } catch(e) {
      recent = [];
    }
    if (!recent || recent.length === 0) {
      container.innerHTML = `
        <div class="recently-empty">
          <div class="re-icon"><i class="fas fa-clock"></i></div>
          <p>لم تستخدم أي أداة بعد</p>
        </div>
      `;
      return;
    }
    recent = recent.slice(0, 8);
    let html = '<div class="recently-scroll">';
    recent.forEach(entry => {
      const tool = TOOLS.find(t => t.id === entry.toolId);
      if (!tool) return;
      const cat = CATEGORIES.find(c => c.id === tool.cat);
      const color = cat ? cat.color : '#6366f1';
      html += `
        <div class="recent-item" onclick="window.navigateTo('${tool.id}')">
          <span class="ri-icon" style="background:${color}"><i class="${tool.icon}"></i></span>
          <span class="ri-label">${tool.name}</span>
        </div>
      `;
    });
    html += '</div>';
    container.innerHTML = html;
  }
  renderRecentlyUsed();

  // ─── Search ───
  let searchTimeout = null;

  function getToolColor(tool) {
    const cat = CATEGORIES.find(c => c.id === tool.cat);
    return cat ? cat.color : '#6366f1';
  }

  function performSearch(query) {
    const resultsContainer = document.getElementById('searchResults');
    if (!query || query.trim() === '') {
      resultsContainer.classList.remove('active');
      resultsContainer.innerHTML = '';
      return;
    }
    const results = window.searchTools ? window.searchTools(query) : [];
    if (results.length === 0) {
      resultsContainer.innerHTML = '<div class="search-empty"><i class="fas fa-search" style="font-size:1.5rem;display:block;margin-bottom:var(--sp-2);opacity:0.4"></i>لا توجد نتائج</div>';
      resultsContainer.classList.add('active');
      return;
    }
    let html = '';
    results.slice(0, 10).forEach(tool => {
      const color = getToolColor(tool);
      html += `
        <div class="search-result-item" onclick="window.navigateTo('${tool.id}')">
          <span class="sri-icon" style="background:${color}"><i class="${tool.icon}"></i></span>
          <div class="sri-info">
            <h4>${highlightMatch(tool.name, query)}</h4>
            <p>${highlightMatch(tool.desc, query)}</p>
          </div>
        </div>
      `;
    });
    resultsContainer.innerHTML = html;
    resultsContainer.classList.add('active');
  }

  function highlightMatch(text, query) {
    const q = query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp('(' + q + ')', 'gi');
    return text.replace(regex, '<mark style="background:var(--color-primary-light);color:var(--color-primary);border-radius:2px;padding:0 2px">$1</mark>');
  }

  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  if (searchInput) {
    searchInput.addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(function() {
        performSearch(this.value);
      }.bind(this), 200);
    });

    searchInput.addEventListener('focus', function() {
      if (this.value.trim()) {
        performSearch(this.value);
      }
    });

    document.addEventListener('click', function(e) {
      const wrapper = document.getElementById('searchWrapper');
      if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById('searchResults').classList.remove('active');
      }
    });
  }

  if (searchClear) {
    searchClear.addEventListener('click', function() {
      if (searchInput) {
        searchInput.value = '';
        searchInput.focus();
        document.getElementById('searchResults').classList.remove('active');
        document.getElementById('searchResults').innerHTML = '';
      }
    });
  }

  // ─── Track tool usage on click (delegated) ───
  document.addEventListener('click', function(e) {
    const toolItem = e.target.closest('[data-tool-id]');
    if (toolItem) {
      const toolId = toolItem.getAttribute('data-tool-id');
      if (toolId && window.addToHistory) {
        window.addToHistory(toolId, '');
      }
    }
  });

  // ─── Smooth scroll for horizontal sections ───
  document.querySelectorAll('.featured-scroll, .recently-scroll').forEach(function(el) {
    let isDown = false;
    let startX;
    let scrollLeft;

    el.addEventListener('mousedown', function(e) {
      isDown = true;
      el.style.cursor = 'grabbing';
      startX = e.pageX - el.offsetLeft;
      scrollLeft = el.scrollLeft;
    });

    el.addEventListener('mouseleave', function() {
      isDown = false;
      el.style.cursor = 'grab';
    });

    el.addEventListener('mouseup', function() {
      isDown = false;
      el.style.cursor = 'grab';
    });

    el.addEventListener('mousemove', function(e) {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - el.offsetLeft;
      const walk = (x - startX) * 1.5;
      el.scrollLeft = scrollLeft - walk;
    });
  });

  // ─── Listen for history changes to update recently used ───
  document.addEventListener('historychange', function() {
    renderRecentlyUsed();
  });
})();
</script>
